name: Deploy Ocheverse

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: [self-hosted, contabo]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.ocheverse.ng
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/ocheverse/web NEXT_PUBLIC_UMAMI_WEBSITE_ID ;
            secret/data/ocheverse/web RSS_PROXY_URL ;
            secret/data/ocheverse/web NEXT_PUBLIC_REMARK42_HOST ;
            secret/data/ocheverse/web NEXT_PUBLIC_REMARK42_SITE_ID ;
            secret/data/ocheverse/web SPOTIFY_CLIENT_ID ;
            secret/data/ocheverse/web SPOTIFY_CLIENT_SECRET ;
            secret/data/ocheverse/web SPOTIFY_REFRESH_TOKEN ;
            secret/data/ocheverse/web GITHUB_TOKEN

      # network=host so the buildkit container inherits /etc/hosts on Contabo
      # (registry.ocheverse.ng pinned to the homelab's Tailscale IP). Without
      # this, buildkit uses its own DNS resolver and hits public CF edge IPs.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.ocheverse.ng:5000"]
              http = true
              insecure = true

      - name: Login to Home Registry (over Tailscale)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}:5000
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Push to homelab registry over Tailscale (/etc/hosts pins the FQDN to the
      # homelab's Tailscale IP; docker daemon treats :5000 as insecure). Traffic
      # skips Cloudflare's ~100s edge cutoff that was 524'ing large blob PUTs.
      # The :sha tag stays around for rollbacks — from Contabo, pull the same
      # registry.ocheverse.ng:5000/ocheverse:<sha> tag.
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}:5000/ocheverse:latest
            ${{ secrets.REGISTRY_HOST }}:5000/ocheverse:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ env.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
            RSS_PROXY_URL=${{ env.RSS_PROXY_URL }}
            NEXT_PUBLIC_REMARK42_HOST=${{ env.NEXT_PUBLIC_REMARK42_HOST }}
            NEXT_PUBLIC_REMARK42_SITE_ID=${{ env.NEXT_PUBLIC_REMARK42_SITE_ID }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, contabo]
    steps:
      - name: Import runtime secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.ocheverse.ng
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/ocheverse/web SPOTIFY_CLIENT_ID ;
            secret/data/ocheverse/web SPOTIFY_CLIENT_SECRET ;
            secret/data/ocheverse/web SPOTIFY_REFRESH_TOKEN ;
            secret/data/ocheverse/web GITHUB_TOKEN ;
            secret/data/ocheverse/web RSS_PROXY_URL ;
            secret/data/ocheverse/web NEXT_PUBLIC_REMARK42_HOST ;
            secret/data/ocheverse/web NEXT_PUBLIC_REMARK42_SITE_ID

      # Runner is on Contabo (the deploy target). Deploy runs local docker
      # commands directly — no SSH hop needed.
      - name: Deploy (local docker)
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          IMAGE="${REGISTRY_HOST}:5000/ocheverse:latest"
          DOMAIN="ocheverse.ng"
          NETWORK="coolify"

          echo "Logging into registry (Tailscale)..."
          echo "$REGISTRY_PASSWORD" | docker login "${REGISTRY_HOST}:5000" -u "$REGISTRY_USERNAME" --password-stdin

          echo "Pulling image: $IMAGE"
          docker pull "$IMAGE"

          echo "Restarting container..."
          docker rm -f ocheverse || true

          docker run -d \
            --name ocheverse \
            --restart unless-stopped \
            --network "$NETWORK" \
            -e SPOTIFY_CLIENT_ID="$SPOTIFY_CLIENT_ID" \
            -e SPOTIFY_CLIENT_SECRET="$SPOTIFY_CLIENT_SECRET" \
            -e SPOTIFY_REFRESH_TOKEN="$SPOTIFY_REFRESH_TOKEN" \
            -e GITHUB_TOKEN="$GITHUB_TOKEN" \
            -e RSS_PROXY_URL="$RSS_PROXY_URL" \
            -e NEXT_PUBLIC_REMARK42_HOST="$NEXT_PUBLIC_REMARK42_HOST" \
            -e NEXT_PUBLIC_REMARK42_SITE_ID="$NEXT_PUBLIC_REMARK42_SITE_ID" \
            -v ocheverse-data:/app/.data \
            --label "traefik.enable=true" \
            --label "traefik.http.services.ocheverse.loadbalancer.server.port=6065" \
            --label "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https" \
            --label "traefik.http.routers.ocheverse-http.rule=Host(\`${DOMAIN}\`) || Host(\`www.${DOMAIN}\`)" \
            --label "traefik.http.routers.ocheverse-http.entrypoints=http" \
            --label "traefik.http.routers.ocheverse-http.middlewares=redirect-to-https" \
            --label "traefik.http.routers.ocheverse-https.rule=Host(\`${DOMAIN}\`) || Host(\`www.${DOMAIN}\`)" \
            --label "traefik.http.routers.ocheverse-https.entrypoints=https" \
            --label "traefik.http.routers.ocheverse-https.tls=true" \
            --label "traefik.http.routers.ocheverse-https.tls.certresolver=letsencrypt" \
            "$IMAGE"

          echo "Health check (public HTTPS):"
          sleep 5
          curl -kfsS "https://${DOMAIN}" >/dev/null && echo "✅ HTTPS OK" || echo "⚠️ HTTPS failed"

          echo "✅ Deployment completed successfully."
