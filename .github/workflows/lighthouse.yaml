name: Lighthouse

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Audit URLs
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://ocheverse.ng/
            https://ocheverse.ng/blog
            https://ocheverse.ng/now
            https://ocheverse.ng/stack
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 2
